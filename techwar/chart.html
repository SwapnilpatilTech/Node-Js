<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>EMI CALCULATOR</title>
  <style>

      body{
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

    .calculator{
            background: #ffffff;
            padding: 25px;
            width: 350px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
          }

     .calculator h2 {
          text-align: center;
          margin-bottom: 20px;
          color: #333;
          height:5vh;
          width:10vh;
      }
      label {
          font-size: 14px;
          color: #555;

      }
      input {
            width: 100%;
            padding: 8px;
            margin: 5px 0 15px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
          width: 100%;
          padding: 10px;
          background: #007bff;
          color: white;
          border: none;
          font-size: 16px;
          border-radius: 4px;
          cursor: pointer;
      }
      button:hover {
              background: #0056b3;
          }
      .result {
                margin-top: 20px;
                background: #f1f1f1;
                padding: 15px;
                border-radius: 5px;
                text-align: center;
            }
      .result p {
                margin: 5px 0;
                font-size: 14px;
            }

</style>
</head>
<body>
    <div class="calculator">
    <h2>EMI Calculator</h2>
    <label>Loan Amount (₹)</label>
    <input type="number" id="loanAmount" placeholder="Enter Loan amount">
    <label>Interest Rate (% per year)</label>
    <input type="number" id="interestRate" placeholder="Enter Interest rate">
    <label>Loan Tenure (Years)</label>
    <input type="number" id="loanTenure" placeholder="Enter Tenure in years">
    <button onclick="calculateEMI()">Calculate EMI</button>
    <div class="result" id="result">
        <p><strong>Monthly EMI:</strong> ₹0</p>
        <p><strong>Principal Amount:</strong> 0</p>
        <p><strong>Total Interest:</strong> ₹0</p>
        <p><strong>Total Amount:</strong> ₹0</p>
    </div>
</div>
<script>
          function calculateEMI() {
          let P = document.getElementById("loanAmount").value;
          let annualRate = document.getElementById("interestRate").value;
          let years = document.getElementById("loanTenure").value;
          let r = annualRate / 12 / 100;
          let n = years * 12;
          if (P === "" || annualRate === "" || years === "") {
             alert("Please fill all fields");
             return;
          }
          let emi = (P * r * Math.pow(1 + r, n)) / (Math.pow(1 + r, n) - 1);
          let totalPayment = emi * n;
          let totalInterest = totalPayment - P;
          document.getElementById("result").innerHTML = `
             <p><strong>Monthly EMI:</strong> ₹${emi.toFixed(2)}</p>
             <p><strong>Total Interest:</strong> ₹${totalInterest.toFixed(2)}</p>
             <p><strong>Total Payment:</strong> ₹${totalPayment.toFixed(2)}</p>
          `;
          }

</script>
</body>
</html>
